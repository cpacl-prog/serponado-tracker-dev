name: Fetch Serponado Rankings

on:
  schedule:
    - cron: '*/30 * * * *'  # alle 30 Minuten
  workflow_dispatch:       # manueller Start jederzeit möglich

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: rankings-update
  cancel-in-progress: false  # Runs werden nacheinander ausgeführt, nicht parallel

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Rankings from DataForSEO
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: python fetch_rankings.py

      - name: Commit & Push rankings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/rankings.json
          git diff --staged --quiet || git commit -m "Update rankings $(date '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin main
          git push

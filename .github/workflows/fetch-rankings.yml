name: Fetch Serponado Rankings

on:
  repository_dispatch:
    types: [fetch-rankings]  # Trigger via Make / externer Cron
  workflow_dispatch:         # manueller Start über GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: rankings-update
  cancel-in-progress: false  # Runs werden nacheinander ausgeführt, nicht parallel

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Rankings from DataForSEO (3× Konsens-Abfrage)
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: python fetch_rankings.py

      - name: Upload Diagnose-Log als Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rankings-log-${{ github.run_id }}
          path: rankings_log.db
          retention-days: 90

      - name: Commit & Push rankings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/rankings.json
          git diff --staged --quiet || git commit -m "Update rankings $(date '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin main
          git push

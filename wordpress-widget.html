
<!-- BLOCK 10 – SERPONADO LEADERBOARD WIDGET
     WordPress: In einen "Custom HTML" Block einbetten, direkt nach block-09-preise.
     Enthält: Live-Ranking-Tabelle + Positionsverlauf-Chart (Daten via GitHub). -->

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<style>
  #serponado-wrap { max-width: 100%; }
  #serponado-wrap .lb-meta { font-size: 0.9rem; color: #888 !important; margin-bottom: 16px; }
  #serponado-wrap .lb-meta strong { color: var(--optimerch-green) !important; }
  #serponado-wrap table thead tr { background: var(--optimerch-green) !important; }
  #serponado-wrap table thead th { color: #000 !important; }
  #serponado-wrap table tbody tr:hover td { background: rgba(255,255,255,0.05) !important; }
  #serponado-wrap table tbody td { color: #ccc !important; }
  #serponado-wrap table tbody td:first-child { color: #fff !important; }
  #serponado-wrap table tbody td:nth-child(2) { color: var(--optimerch-green) !important; }
  #serponado-wrap .own td { background: rgba(42,183,88,0.08) !important; }
  #serponado-wrap .own td:first-child,
  #serponado-wrap .own td:nth-child(2) { font-weight: 800; }
  #serponado-chart-wrap { margin-top: 30px; background: var(--darker-bg); border: 1px solid #222; border-radius: 12px; padding: 24px; }
  #serponado-chart-wrap h3 { margin: 0 0 16px; font-size: 1rem; color: #fff !important; }
  #serponado-status { color: #888 !important; font-size: 0.95rem; }
</style>

<section class="section-padding container">
    <div class="serponado-explainer">
        <div class="overline">LIVE – WIRD STÜNDLICH AKTUALISIERT</div>
        <h2 class="section-title">Serponado <span>Live-Ranking</span></h2>
        <div id="serponado-wrap">
            <p id="serponado-status">Lade Rankings...</p>
        </div>
    </div>
</section>

<script>
(function() {
  const GITHUB_USER   = 'cpacl-prog';
  const GITHUB_REPO   = 'serponado-tracker';
  const EIGENE_DOMAIN = 'optimerch.de';
  const MAX_ROWS      = 20;
  const REFRESH_MS    = 60 * 60 * 1000;

  function load() {
    const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/public/rankings.json?t=${Date.now()}`;
    fetch(url)
      .then(r => r.json())
      .then(render)
      .catch(() => {
        document.getElementById('serponado-status').textContent = 'Rankings konnten nicht geladen werden.';
      });
  }

  function render(data) {
    const wrap = document.getElementById('serponado-wrap');

    if (!data.rankings || data.rankings.length === 0) {
      wrap.innerHTML = '<p style="color:#888">Noch keine Rankings vorhanden.</p>';
      return;
    }

    const top = data.rankings.slice(0, MAX_ROWS);

    const rows = top.map(r => {
      const isOwn = r.domain && r.domain.includes(EIGENE_DOMAIN);
      const medal = r.position === 1 ? '🥇' : r.position === 2 ? '🥈' : r.position === 3 ? '🥉' : '';
      const title = (r.title || r.url).replace(/</g, '&lt;');
      return `
        <tr class="${isOwn ? 'own' : ''}">
          <td>${medal} #${r.position}</td>
          <td>${r.domain}${isOwn ? ' ⭐' : ''}</td>
          <td style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${title}</td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <p class="lb-meta">🔍 Keyword: <strong>${data.keyword}</strong> &nbsp;|&nbsp; Stand: ${data.updated_at}</p>
      <table>
        <thead><tr><th>Platz</th><th>Domain</th><th>Seite</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div id="serponado-chart-wrap">
        <h3>📈 ${EIGENE_DOMAIN} – Positionsverlauf</h3>
        <canvas id="serponado-chart" height="100"></canvas>
      </div>`;

    renderChart(data.history || []);
  }

  function renderChart(history) {
    if (history.length < 2) {
      document.getElementById('serponado-chart-wrap').innerHTML +=
        '<p style="font-size:0.85rem;color:#666">Noch zu wenig Daten für den Verlauf.</p>';
      return;
    }

    const labels = history.map(h => h.ts.replace(' UTC', ''));
    const values = history.map(h => h.pos);

    new Chart(document.getElementById('serponado-chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Position',
          data: values,
          borderColor: '#2ab758',
          backgroundColor: 'rgba(42,183,88,0.1)',
          pointRadius: 3,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            reverse: true,
            min: 1,
            title: { display: true, text: 'Platz', color: '#888' },
            ticks: { stepSize: 1, color: '#888' },
            grid: { color: 'rgba(255,255,255,0.05)' }
          },
          x: {
            ticks: { maxTicksLimit: 12, maxRotation: 45, color: '#888' },
            grid: { color: 'rgba(255,255,255,0.05)' }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ctx.parsed.y ? `Platz ${ctx.parsed.y}` : 'nicht gefunden'
            }
          }
        }
      }
    });
  }

  load();
  setInterval(load, REFRESH_MS);
})();
</script>

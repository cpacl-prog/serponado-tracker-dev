<!-- Serponado Leaderboard Widget -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<style>
  #serponado-wrap { font-family: sans-serif; max-width: 750px; }
  #serponado-wrap table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  #serponado-wrap th { background: #1a1a2e; color: #fff; padding: 10px; text-align: left; }
  #serponado-wrap td { padding: 9px 10px; border-bottom: 1px solid #eee; font-size: 14px; }
  #serponado-wrap tr:hover td { background: #f5f5f5; }
  #serponado-wrap .pos { font-weight: bold; color: #1a1a2e; width: 55px; }
  #serponado-wrap .own td { background: #fff8e1 !important; font-weight: bold; }
  #serponado-wrap .meta { font-size: 12px; color: #999; margin-bottom: 6px; }
  #serponado-wrap a { color: #0066cc; text-decoration: none; }
  #serponado-wrap a:hover { text-decoration: underline; }
  #serponado-chart-wrap { margin-top: 24px; background: #f9f9f9; border-radius: 8px; padding: 16px; }
  #serponado-chart-wrap h3 { margin: 0 0 12px; font-size: 14px; color: #1a1a2e; }
</style>

<div id="serponado-wrap">
  <p class="meta" id="serponado-status">Lade Rankings...</p>
</div>

<script>
(function() {
  const GITHUB_USER   = 'cpacl-prog';
  const GITHUB_REPO   = 'serponado-tracker';
  const EIGENE_DOMAIN = 'optimerch.de';
  const REFRESH_MS    = 60 * 60 * 1000; // 1 Stunde

  function load() {
    const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/public/rankings.json?t=${Date.now()}`;

    fetch(url)
      .then(r => r.json())
      .then(render)
      .catch(() => {
        document.getElementById('serponado-status').textContent = 'Rankings konnten nicht geladen werden.';
      });
  }

  function render(data) {
    const wrap = document.getElementById('serponado-wrap');

    if (!data.rankings || data.rankings.length === 0) {
      wrap.innerHTML = '<p>Noch keine Rankings vorhanden.</p>';
      return;
    }

    const rows = data.rankings.map(r => {
      const isOwn = r.domain && r.domain.includes(EIGENE_DOMAIN);
      const medal = r.position === 1 ? '🥇' : r.position === 2 ? '🥈' : r.position === 3 ? '🥉' : '';
      return `
        <tr class="${isOwn ? 'own' : ''}">
          <td class="pos">${medal} #${r.position}</td>
          <td>${r.domain}${isOwn ? ' ⭐' : ''}</td>
          <td style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
            <a href="${r.url}" target="_blank" rel="nofollow">${r.title || r.url}</a>
          </td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <p class="meta">🔍 Keyword: <strong>${data.keyword}</strong> &nbsp;|&nbsp; Stand: ${data.updated_at}</p>
      <table>
        <thead><tr><th>Platz</th><th>Domain</th><th>Seite</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div id="serponado-chart-wrap">
        <h3>📈 ${EIGENE_DOMAIN} – Positionsverlauf</h3>
        <canvas id="serponado-chart" height="100"></canvas>
      </div>`;

    renderChart(data.history || []);
  }

  function renderChart(history) {
    if (history.length < 2) {
      document.getElementById('serponado-chart-wrap').innerHTML +=
        '<p style="font-size:13px;color:#999">Noch zu wenig Daten für den Verlauf.</p>';
      return;
    }

    const labels = history.map(h => h.ts.replace(' UTC', ''));
    const values = history.map(h => h.pos);

    new Chart(document.getElementById('serponado-chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Position',
          data: values,
          borderColor: '#1a1a2e',
          backgroundColor: 'rgba(26,26,46,0.08)',
          pointRadius: 3,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            reverse: true,
            min: 1,
            title: { display: true, text: 'Platz' },
            ticks: { stepSize: 1 }
          },
          x: {
            ticks: { maxTicksLimit: 12, maxRotation: 45 }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ctx.parsed.y ? `Platz ${ctx.parsed.y}` : 'nicht gefunden'
            }
          }
        }
      }
    });
  }

  load();
  setInterval(load, REFRESH_MS);
})();
</script>

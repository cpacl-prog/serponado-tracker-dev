<!-- BLOCK 10 – SERPONADO LEADERBOARD WIDGET
     WordPress: In einen "Custom HTML" Block einbetten, direkt nach block-09-preise.
     Enthält: Eigene URL-Position, Live-Ranking-Tabelle + Positionsverlauf-Chart (Daten via GitHub). -->

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<style>
  #serponado-wrap { max-width: 100%; }
  #serponado-wrap .lb-meta { font-size: 0.9rem; color: #888 !important; margin-bottom: 16px; }
  #serponado-wrap .lb-meta strong { color: var(--optimerch-green) !important; }
  #serponado-wrap table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  #serponado-wrap table thead tr { background: var(--optimerch-green) !important; }
  #serponado-wrap table thead th { color: #000 !important; padding: 10px; text-align: left; }
  #serponado-wrap table tbody td { color: #ccc !important; padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  #serponado-wrap table tbody tr:hover td { background: rgba(255,255,255,0.05) !important; }
  #serponado-wrap table tbody td:first-child { color: #fff !important; }
  #serponado-wrap table tbody td:nth-child(2) { color: var(--optimerch-green) !important; }
  #serponado-wrap .own td { background: rgba(42,183,88,0.08) !important; }
  #serponado-wrap .own td:first-child,
  #serponado-wrap .own td:nth-child(2) { font-weight: 800; }
  .sn-chart-wrap { background: var(--darker-bg); border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .sn-chart-wrap h3 { margin: 0 0 16px; font-size: 1rem; color: #fff !important; }
  .sn-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
  .sn-legend-item { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px 3px 7px; border-radius: 20px; border: 1px solid transparent; cursor: default; font-size: 0.75rem; color: #aaa !important; transition: color 0.15s, background 0.15s, border-color 0.15s; }
  .sn-legend-item:hover { color: #fff !important; }
  .sn-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  #serponado-status { color: #888 !important; font-size: 0.95rem; }
  .sn-own-url { display: flex; align-items: center; gap: 16px; background: rgba(42,183,88,0.08); border: 1px solid rgba(42,183,88,0.3); border-radius: 12px; padding: 18px 22px; margin-bottom: 24px; }
  .sn-own-url .sn-pos { font-size: 2.2rem; font-weight: 900; color: var(--optimerch-green) !important; line-height: 1; min-width: 60px; text-align: center; }
  .sn-own-url .sn-pos span { display: block; font-size: 0.7rem; font-weight: 400; color: #888 !important; margin-top: 2px; }
  .sn-own-url .sn-info { flex: 1; }
  .sn-own-url .sn-info strong { display: block; color: #fff !important; font-size: 0.95rem; margin-bottom: 4px; }
  .sn-own-url .sn-info a { color: #888 !important; font-size: 0.8rem; text-decoration: none; word-break: break-all; }
  .sn-own-url .sn-info a:hover { color: var(--optimerch-green) !important; }
</style>

<section class="section-padding container">
    <div class="serponado-explainer">
        <div class="overline">LIVE – TOP 20 · WIRD ALLE 30 MIN AKTUALISIERT</div>
        <h2 class="section-title">Serponado <span>Live-Ranking Top 20</span></h2>
        <div id="serponado-wrap">
            <p id="serponado-status">Lade Rankings...</p>
        </div>
    </div>
</section>

<script>
(function() {
  const GITHUB_USER   = 'cpacl-prog';
  const GITHUB_REPO   = 'serponado-tracker';
  const EIGENE_DOMAIN = 'optimerch.de';
  const MAX_ROWS      = 20;
  const REFRESH_MS    = 30 * 60 * 1000;
  const FAVICON_URL   = 'https://www.optimerch.de/wp-content/uploads/2021/04/optimerch-favicon-kreis.webp';
  const OWN_COLOR     = '#2ab758';
  const PALETTE       = [
    '#e74c3c','#3498db','#f39c12','#9b59b6','#1abc9c',
    '#e67e22','#2980b9','#c0392b','#8e44ad','#16a085',
    '#d35400','#f1c40f','#e91e63','#ff5722','#607d8b',
    '#00bcd4','#ff9800','#795548','#009688','#673ab7'
  ];

  const faviconImg = new Image(14, 14);
  faviconImg.src = FAVICON_URL;

  const glowPlugin = {
    id: 'ownLineGlow',
    beforeDatasetDraw(chart, args) {
      const ds = chart.data.datasets[args.index];
      if (!ds.label.includes(EIGENE_DOMAIN)) return;
      const ctx = chart.ctx;
      ctx.save();
      ctx.shadowColor = OWN_COLOR;
      ctx.shadowBlur  = 28;
    },
    afterDatasetDraw(chart, args) {
      const ds = chart.data.datasets[args.index];
      if (!ds.label.includes(EIGENE_DOMAIN)) return;
      chart.ctx.restore();
    }
  };
  Chart.register(glowPlugin);

  let colorMap = {};

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function buildColorMap(entries) {
    colorMap = {};
    let idx = 0;
    entries.forEach(h => {
      if (!h.positions) return;
      Object.keys(h.positions).forEach(d => {
        if (!(d in colorMap))
          colorMap[d] = d.includes(EIGENE_DOMAIN) ? OWN_COLOR : PALETTE[idx++ % PALETTE.length];
      });
    });
  }

  function load() {
    const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/public/rankings.json?t=${Date.now()}`;
    fetch(url)
      .then(r => r.json())
      .then(render)
      .catch(() => {
        document.getElementById('serponado-status').textContent = 'Rankings konnten nicht geladen werden.';
      });
  }

  function aggregateDaily(history) {
    const byDate = {};
    history.forEach(h => { byDate[h.ts.split(' ')[0]] = h; });
    return Object.keys(byDate).sort().slice(-30).map(d => byDate[d]);
  }

  function buildDatasets(entries) {
    const domainSet = new Set();
    entries.forEach(h => { if (h.positions) Object.keys(h.positions).forEach(d => domainSet.add(d)); });
    return Array.from(domainSet).map(domain => {
      const isOwn = domain.includes(EIGENE_DOMAIN);
      const color = colorMap[domain] || '#888';
      return {
        label:            domain,
        data:             entries.map(h => h.positions ? (h.positions[domain] || null) : null),
        borderColor:      color,
        backgroundColor:  isOwn ? hexToRgba(color, 0.08) : 'transparent',
        borderWidth:      isOwn ? 2.5 : 1.5,
        pointStyle:       isOwn ? faviconImg : 'circle',
        pointRadius:      isOwn ? 8 : 2,
        pointHoverRadius: isOwn ? 10 : 5,
        tension:          0.3,
        fill:             isOwn,
        spanGaps:         true,
        order:            isOwn ? 0 : 1,
      };
    });
  }

  function chartOptions() {
    return {
      responsive: true,
      interaction: { mode: 'index', axis: 'x', intersect: false },
      scales: {
        y: {
          reverse: true, min: 1, max: MAX_ROWS,
          title: { display: true, text: 'Platz', color: '#888' },
          ticks: { stepSize: 5, color: '#888' },
          grid:  { color: 'rgba(255,255,255,0.05)' }
        },
        x: {
          ticks: { maxTicksLimit: 12, maxRotation: 45, color: '#888' },
          grid:  { color: 'rgba(255,255,255,0.05)' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          filter: item => item.dataset.label.includes(EIGENE_DOMAIN),
          callbacks: {
            label: ctx => `${ctx.dataset.label}: Platz ${ctx.parsed.y ?? 'nicht in Top 20'}`
          }
        }
      }
    };
  }

  function attachLegend(chart, legendEl) {
    const datasets = chart.data.datasets;
    legendEl.innerHTML = '';
    datasets.forEach((ds, i) => {
      const color = colorMap[ds.label] || '#888';
      const item  = document.createElement('span');
      item.className = 'sn-legend-item';
      item.style.borderColor = hexToRgba(color, 0.3);
      item.innerHTML = `<span class="sn-legend-dot" style="background:${color}"></span>${ds.label}`;

      item.addEventListener('mouseenter', () => {
        datasets.forEach((d, j) => {
          const c = colorMap[d.label] || '#888';
          d.borderColor = j === i ? c : hexToRgba(c, 0.1);
          d.borderWidth = j === i ? (d.label.includes(EIGENE_DOMAIN) ? 3.5 : 2.5) : 0.5;
        });
        item.style.background = hexToRgba(color, 0.15);
        item.style.borderColor = color;
        chart.update('none');
      });

      item.addEventListener('mouseleave', () => {
        datasets.forEach(d => {
          d.borderColor = colorMap[d.label] || '#888';
          d.borderWidth = d.label.includes(EIGENE_DOMAIN) ? 2.5 : 1.5;
        });
        item.style.background = '';
        item.style.borderColor = hexToRgba(color, 0.3);
        chart.update('none');
      });

      legendEl.appendChild(item);
    });
  }

  function renderChart(canvasId, legendId, entries, labelFn) {
    if (entries.length < 2) {
      document.getElementById(canvasId).parentElement.innerHTML +=
        '<p style="font-size:0.85rem;color:#666">Noch zu wenig Daten.</p>';
      return;
    }
    const chart = new Chart(document.getElementById(canvasId), {
      type: 'line',
      data: { labels: entries.map(labelFn), datasets: buildDatasets(entries) },
      options: chartOptions()
    });
    attachLegend(chart, document.getElementById(legendId));
  }

  const DISCLAIMER = '<p style="font-size:0.75rem;color:#666;margin-top:8px">Daten via DataForSEO – Abweichungen zum tatsächlichen Google-Ranking möglich.</p>';

  function renderOwnUrl(own) {
    if (!own) return '';
    if (!own.position) return `
      <div class="sn-own-url">
        <div class="sn-pos">–<span>Platz</span></div>
        <div class="sn-info">
          <strong>optimerch.de/serponado/ – Aktuell nicht in den Top 100 erfasst</strong>
          <a href="${own.url}" target="_blank" rel="nofollow">${own.url}</a>
          ${DISCLAIMER}
        </div>
      </div>`;
    return `
      <div class="sn-own-url">
        <div class="sn-pos">#${own.position}<span>Platz</span></div>
        <div class="sn-info">
          <strong>${own.title || 'optimerch.de/serponado/'}</strong>
          <a href="${own.url}" target="_blank" rel="nofollow">${own.url}</a>
          ${DISCLAIMER}
        </div>
      </div>`;
  }

  function render(data) {
    const wrap = document.getElementById('serponado-wrap');

    if (!data.rankings || data.rankings.length === 0) {
      wrap.innerHTML = '<p style="color:#888">Noch keine Rankings vorhanden.</p>';
      return;
    }

    const valid  = (data.history || []).filter(h => h.positions);
    const hourly = valid.slice(-48);
    const daily  = aggregateDaily(valid);

    buildColorMap(valid);

    const rows = data.rankings.slice(0, MAX_ROWS).map(r => {
      const isOwn = r.domain && r.domain.includes(EIGENE_DOMAIN);
      const medal = r.position === 1 ? '🥇' : r.position === 2 ? '🥈' : r.position === 3 ? '🥉' : '';
      const title = (r.title || r.url).replace(/</g, '&lt;');
      return `
        <tr class="${isOwn ? 'own' : ''}">
          <td>${medal} #${r.position}</td>
          <td>${r.domain}${isOwn ? ' ⭐' : ''}</td>
          <td style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${title}</td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <p class="lb-meta">🔍 Keyword: <strong>${data.keyword}</strong> &nbsp;|&nbsp; Übersicht der Top 20 Google-Positionen &nbsp;|&nbsp; Stand: ${data.updated_at}</p>

      ${renderOwnUrl(data.own_url)}

      <div class="sn-chart-wrap">
        <h3>⏱ Verlauf im 30-Minuten-Takt (letzte 24 Stunden)</h3>
        <canvas id="sn-chart-hourly" height="110"></canvas>
        <div class="sn-legend" id="sn-legend-hourly"></div>
      </div>

      <div class="sn-chart-wrap">
        <h3>📅 Tagesverlauf (letzte 30 Tage)</h3>
        <canvas id="sn-chart-daily" height="110"></canvas>
        <div class="sn-legend" id="sn-legend-daily"></div>
      </div>

      <table>
        <thead><tr><th>Platz</th><th>Domain (Top 20)</th><th>Seite</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    renderChart('sn-chart-hourly', 'sn-legend-hourly', hourly, h => h.ts.replace(' UTC','').split(' ')[1]);
    renderChart('sn-chart-daily',  'sn-legend-daily',  daily,  h => h.ts.split(' ')[0]);
  }

  load();
  setInterval(load, REFRESH_MS);
})();
</script>
